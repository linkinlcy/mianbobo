<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>减脂记录工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">减脂记录</p>
          <h1 id="pageTitle">今日</h1>
        </div>
        <input id="activeDate" class="date-input" type="date" />
      </header>

      <main>
        <section id="view-home" class="view active">
          <section class="today-strip">
            <span>今日日期</span>
            <strong id="homeDateText">--</strong>
          </section>

          <div class="target-panel">
            <div class="panel-head">
              <div>
                <p class="section-label">今日碳循环</p>
                <h2 id="homeDayType">低碳日</h2>
              </div>
              <select id="dayTypeSelect" class="select">
                <option value="low">低碳日</option>
                <option value="mid">中碳日</option>
                <option value="high">高碳日</option>
              </select>
            </div>
            <p class="target-source" id="targetSourceText">使用默认目标</p>
            <div class="macro-grid" id="homeSummary"></div>
          </div>

          <div class="quick-grid">
            <button class="quick-card" data-nav="food" type="button">
              <span>饮食</span>
              <strong id="homeFoodTotal">0 kcal</strong>
            </button>
            <button class="quick-card" data-nav="training" type="button">
              <span>训练</span>
              <strong id="homeTrainingType">未记录</strong>
            </button>
          </div>
          <button class="secondary-btn share-btn" id="shareTodayBtn" type="button">分享今日</button>

          <section class="section">
            <div class="section-title">
              <h2>最近食物</h2>
              <span>快速填入</span>
            </div>
            <div class="shortcut-row" id="homeRecentFoods"></div>
          </section>

          <section class="section">
            <div class="section-title">
              <h2>最近动作</h2>
              <span>一键继续</span>
            </div>
            <div class="shortcut-row" id="homeRecentExercises"></div>
          </section>

          <section class="section">
            <div class="section-title">
              <h2>剩余摄入</h2>
              <span id="homeGapHint"></span>
            </div>
            <div class="gap-list" id="homeGaps"></div>
          </section>
        </section>

        <section id="view-food" class="view">
          <section class="section">
            <div class="section-title">
              <h2>饮食记录</h2>
              <span id="foodTotalHint">0 kcal</span>
            </div>
            <div class="meal-tabs" id="mealTabs"></div>
            <div class="library-block">
              <div class="mini-title">我的收藏</div>
              <div class="shortcut-row" id="favoriteFoods"></div>
              <div class="mini-title">最近使用</div>
              <div class="shortcut-row" id="recentFoods"></div>
              <div class="mini-title">常用食物</div>
              <div class="shortcut-row" id="commonFoods"></div>
            </div>
            <form id="foodForm" class="form-card">
              <input id="foodName" type="text" placeholder="食物名称，例如 鸡胸肉" autocomplete="off" list="foodSuggestions" required />
              <datalist id="foodSuggestions"></datalist>
              <div class="food-match" id="foodMatchHint">输入食物名称和重量后自动计算</div>
              <div class="search-results" id="foodSearchResults"></div>
              <label id="foodAmountLabel">重量 g<input id="foodWeight" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例如 150" /></label>
              <div class="input-grid">
                <label>碳水 g<input id="foodCarbs" type="number" inputmode="decimal" min="0" step="0.1" /></label>
                <label>蛋白 g<input id="foodProtein" type="number" inputmode="decimal" min="0" step="0.1" /></label>
                <label>脂肪 g<input id="foodFat" type="number" inputmode="decimal" min="0" step="0.1" /></label>
                <label>热量 kcal<input id="foodCalories" type="number" inputmode="decimal" min="0" step="1" /></label>
              </div>
              <label class="check-row">
                <input id="saveCustomFood" type="checkbox" />
                <span>保存为常用食物</span>
              </label>
              <div class="form-actions">
                <button class="secondary-btn hidden" id="cancelFoodEdit" type="button">取消编辑</button>
                <button class="primary-btn" id="foodSubmitBtn" type="submit">添加到当前餐</button>
              </div>
            </form>
          </section>
          <section class="section meal-list" id="mealLists"></section>
        </section>

        <section id="view-training" class="view">
          <section class="section">
            <div class="section-title">
              <h2>训练记录</h2>
              <span id="exerciseCountHint">0 个动作</span>
            </div>
            <label class="field-label">训练类型
              <select id="trainingType" class="select wide">
                <option>胸</option>
                <option>背</option>
                <option>腿</option>
                <option>肩</option>
                <option>手臂</option>
                <option>全身</option>
                <option>有氧</option>
                <option>休息</option>
              </select>
            </label>
            <div class="library-block">
              <div class="mini-title">训练模板</div>
              <div class="shortcut-row" id="trainingTemplates"></div>
              <div class="mini-title">推荐动作</div>
              <div class="shortcut-row" id="recommendedExercises"></div>
              <div class="mini-title">最近训练动作</div>
              <div class="shortcut-row" id="recentExercises"></div>
            </div>
            <form id="exerciseForm" class="form-card">
              <input id="exerciseName" type="text" placeholder="动作名称" autocomplete="off" required />
              <div class="input-grid three">
                <label>重量 kg<input id="exerciseWeight" type="number" inputmode="decimal" min="0" step="0.5" /></label>
                <label>次数<input id="exerciseReps" type="number" inputmode="numeric" min="0" step="1" /></label>
                <label>组数<input id="exerciseSets" type="number" inputmode="numeric" min="0" step="1" /></label>
              </div>
              <input id="exerciseNote" type="text" placeholder="备注，可选" autocomplete="off" />
              <button class="primary-btn" type="submit">添加动作</button>
            </form>
          </section>
          <section class="section">
            <div class="section-title">
              <h2>当天动作</h2>
            </div>
            <div id="exerciseList" class="record-list"></div>
          </section>
          <section class="section">
            <div class="section-title">
              <h2>历史训练</h2>
            </div>
            <div id="trainingHistory" class="history-list"></div>
          </section>
        </section>

        <section id="view-dashboard" class="view">
          <section class="section">
            <div class="section-title">
              <h2>最近 7 天</h2>
              <span id="dashboardRange"></span>
            </div>
            <div class="dashboard-grid" id="dashboardCards"></div>
          </section>
        </section>

        <section id="view-settings" class="view">
          <section class="section">
            <div class="section-title">
              <h2>个人目标设置</h2>
              <span id="profileStatus">未设置</span>
            </div>
            <form id="profileForm" class="form-card">
              <label>性别
                <select id="profileGender" class="select wide">
                  <option value="male">男</option>
                  <option value="female">女</option>
                </select>
              </label>
              <div class="input-grid">
                <label>身高 cm<input id="profileHeight" type="number" inputmode="decimal" min="0" step="1" /></label>
                <label>体重 kg<input id="profileWeight" type="number" inputmode="decimal" min="0" step="0.1" /></label>
              </div>
              <label>训练频率
                <select id="profileActivity" class="select wide">
                  <option value="0-1">每周运动 0-1 小时</option>
                  <option value="2-3">每周运动 2-3 小时</option>
                  <option value="4-5">每周运动 4-5 小时</option>
                  <option value="6+">每周运动 6 小时以上</option>
                </select>
              </label>
              <label>目标
                <select id="profileGoal" class="select wide">
                  <option value="fat-loss">减脂</option>
                  <option value="maintain">维持</option>
                  <option value="muscle-gain">增肌</option>
                </select>
              </label>
              <label>蛋白强度
                <select id="profileProteinMode" class="select wide">
                  <option value="standard">标准减脂：1.6g/kg</option>
                  <option value="high">力量/高强度：1.8g/kg</option>
                </select>
              </label>
              <button class="primary-btn" type="submit">保存并生成目标</button>
            </form>
          </section>
          <section class="section">
            <div class="section-title">
              <h2>生成结果</h2>
              <span>低 / 中 / 高碳</span>
            </div>
            <div class="dashboard-grid" id="targetPreview"></div>
          </section>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="主导航">
        <button class="nav-btn active" data-nav="home" type="button">今日</button>
        <button class="nav-btn" data-nav="food" type="button">饮食</button>
        <button class="nav-btn" data-nav="training" type="button">训练</button>
        <button class="nav-btn" data-nav="dashboard" type="button">看板</button>
        <button class="nav-btn" data-nav="settings" type="button">设置</button>
      </nav>
    </div>
    <dialog class="share-dialog" id="shareDialog">
      <div class="share-content">
        <div class="section-title">
          <h2>分享今日</h2>
          <span>文字版</span>
        </div>
        <textarea id="shareText" class="share-text" readonly></textarea>
        <div class="form-actions">
          <button class="primary-btn" id="copyShareText" type="button">复制文字</button>
          <button class="secondary-btn" id="closeShareDialog" type="button">关闭</button>
        </div>
      </div>
    </dialog>
    <div class="toast hidden" id="toast">已复制，可发送给朋友</div>
    <script src="./food-database.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
